services:
  authelia:
    image: authelia/authelia:4.39.20
    container_name: authelia
    restart: unless-stopped
    environment:
      # Pattern raccomandato da Authelia: secret letti da file, non da env
      # var in chiaro (visibili con `docker inspect`/`ps`).
      - AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET_FILE=/secrets/jwt_secret
      - AUTHELIA_SESSION_SECRET_FILE=/secrets/session_secret
      - AUTHELIA_STORAGE_ENCRYPTION_KEY_FILE=/secrets/storage_encryption_key
      # Per attivare identity_providers.oidc (vedi oidc.yml.example): dopo
      # aver creato authelia/oidc.yml e generato i secret mancanti con
      # `./script.sh authelia gen-secrets`, scommenta questa riga insieme
      # alle due sotto in "volumes". La chiave RSA dell'issuer (jwks[].key)
      # NON passa da qui: è una lista, va incollata a mano dentro oidc.yml
      # (spiegato nel file stesso).
      - AUTHELIA_IDENTITY_PROVIDERS_OIDC_HMAC_SECRET_FILE=/secrets/oidc_hmac_secret
      # var che dice ad Authelia di caricare PIÙ file di config (di default
      # ne carica uno solo):
      - X_AUTHELIA_CONFIG=/config/configuration.yml,/config/oidc.yml
      # SMTP reale per il notifier (vedi notifier in configuration.yml):
      # repo pubblico, quindi host/mittente/credenziali NON sono scritti né
      # qui né in configuration.yml, ma letti da authelia/.env (copia di
      # authelia/.env.example, gitignored). Authelia li recepisce come
      # notifier.smtp.* anche se configuration.yml non ha alcuna chiave
      # "smtp:" esplicita. Finché authelia/.env non esiste/è vuoto, queste
      # righe restano commentate e resta attivo il notifier "filesystem"
      # di fallback — scommenta insieme al passaggio da filesystem a smtp
      # in configuration.yml.
      - AUTHELIA_NOTIFIER_SMTP_ADDRESS=${AUTHELIA_NOTIFIER_SMTP_ADDRESS}
      - AUTHELIA_NOTIFIER_SMTP_SENDER=${AUTHELIA_NOTIFIER_SMTP_SENDER}
      - AUTHELIA_NOTIFIER_SMTP_IDENTIFIER=${AUTHELIA_NOTIFIER_SMTP_IDENTIFIER}
      - AUTHELIA_NOTIFIER_SMTP_USERNAME=${AUTHELIA_NOTIFIER_SMTP_USERNAME}
      - AUTHELIA_NOTIFIER_SMTP_PASSWORD=${AUTHELIA_NOTIFIER_SMTP_PASSWORD}
    volumes:
      - ./configuration.yml:/config/configuration.yml:ro
      - ./users_database.yml:/config/users_database.yml:ro
      - ./secrets:/secrets:ro
      - authelia_storage:/storage
      - ./oidc.yml:/config/oidc.yml:ro
    networks:
      - caddy
    labels:
      caddy: auth.whalestudio.dev, auth.ildeposito.org
      caddy.reverse_proxy: "{{upstreams 9091}}"

volumes:
  authelia_storage:

networks:
  caddy:
    external: true
