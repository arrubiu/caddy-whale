---
# Configurazione base di Authelia: utenti su file YAML, storage SQLite,
# notifiche su file locale. I tre segreti richiesti (JWT/session/storage)
# NON vanno qui: sono passati come variabili d'ambiente dal
# docker-compose.yml (vedi AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET_FILE,
# AUTHELIA_SESSION_SECRET_FILE, AUTHELIA_STORAGE_ENCRYPTION_KEY_FILE).
#
# UN SOLO FILE, di proposito: Authelia supporta più file di configurazione,
# ma quando la stessa sezione a lista (es. access_control.rules, o i client
# oidc) è definita in più file NON viene unita — l'ultimo file caricato
# sovrascrive interamente quello scritto prima negli altri, senza alcun
# errore o avviso. Per questo qui dividiamo gli ambiti SOLO con commenti,
# non con file separati: aggiungete pure ciascuno le proprie regole, ma
# sempre in questo stesso file, sotto access_control.rules più in basso.
#
# ============================================================
# SEZIONE CORE — non specifica di alcun sito, riguarda l'istanza
# Authelia nel suo complesso (server, log, backend utenti, sessioni,
# storage, notifiche). Non serve toccarla per aggiungere un dominio.
# ============================================================
#
# Istanza MULTIDOMINIO: questa stessa Authelia gestisce sia whalestudio.dev
# che ildeposito.org (raggiungibile rispettivamente su auth.whalestudio.dev
# e auth.ildeposito.org, vedi label caddy nel docker-compose.yml). Il
# wildcard è sui SOTTODOMINI di ciascuno dei due domini, non tra i due
# domini: il cookie di sessione (vedi session.cookies più sotto) è per
# dominio radice e copre automaticamente tutti i sottodomini presenti e
# futuri di quel radice, ma NON crea SSO tra whalestudio.dev e
# ildeposito.org — sono due domini di primo livello diversi, ciascuno
# richiede il proprio login (vedi nota "SSO tra domini separati" nel
# README).

server:
  address: 'tcp://0.0.0.0:9091'

log:
  level: 'info'

identity_validation:
  reset_password:
    jwt_algorithm: 'HS256'

authentication_backend:
  file:
    path: '/config/users_database.yml'
    watch: true   # ricarica il file utenti quando cambia, senza restart

# ============================================================
# SEZIONE ACCESS CONTROL — ogni nuovo dominio va aggiunto alla lista
# "rules" più sotto, con un commento "# --- <dominio> ---" a fare da
# confine visivo tra le regole di un dominio e quelle di un altro (vedi
# nota in cima sul perché tutto sta in questo unico file).
# ============================================================
#
# Nessun sito è ancora effettivamente gateato: quello si fa sito per sito,
# con `forward_auth authelia:9091 {...}` nelle label del suo docker-compose
# (vedi authelia/README.md), non qui. Qui si decide solo QUALE policy si
# applica a chi arriva.
#
# Match per GRUPPO (definito in users_database.yml, ignorato da git) invece
# che per username: così il vero nome dell'account non finisce mai in un
# file versionato, e se l'utente cambia nome/account basta aggiornare
# users_database.yml, non questo file.
#
# default_policy: deny + nessuna regola con policy "bypass" = un dominio NON
# elencato qui sotto è totalmente inaccessibile se il suo docker-compose usa
# forward_auth verso Authelia (eredita default_policy, che è deny senza
# eccezioni) — ogni dominio da proteggere richiede una propria regola
# esplicita. Sui domini elencati, gli anonimi (nessun login) non entrano
# comunque mai: one_factor e two_factor richiedono sempre un'autenticazione
# valida, la differenza è solo quanti fattori.
access_control:
  default_policy: 'deny'
  rules:
    # --- stage.ildeposito.org ---
    # Frontend stage (non pubblico: tutto l'ambiente stage resta dietro
    # login) — sola password, nessun secondo fattore (scelta esplicita:
    # niente 2FA nemmeno per gli admin su questo dominio, il backend
    # admin-stage sotto invece lo richiede).
    - domain: 'stage.ildeposito.org'
      subject: 'group:ildeposito_stage'
      policy: 'one_factor'

    # --- admin-stage.ildeposito.org ---
    # Backend Drupal stage. Chi è SIA admins CHE ildeposito_stage deve
    # passare per due fattori (AND esplicito, sintassi lista-di-liste:
    # primo livello = OR, secondo livello = AND — stessa convenzione già
    # usata in oidc.yml.example per ildeposito_prod_admins); gli altri
    # membri di ildeposito_stage restano a un fattore solo. Regola più
    # specifica PRIMA di quella generale: Authelia valuta le regole in
    # ordine e si ferma alla prima che fa match.
    - domain: 'admin-stage.ildeposito.org'
      subject:
        - ['group:admins', 'group:ildeposito_stage']
      policy: 'two_factor'
    - domain: 'admin-stage.ildeposito.org'
      subject: 'group:ildeposito_stage'
      policy: 'one_factor'

    # --- portainer.whalestudio.dev ---
    # Gate di rete davanti a Portainer (accesso Docker = root-equivalente):
    # due fattori, e AND esplicito su admins+portainer (stessa sintassi
    # lista-di-liste di admin-stage.ildeposito.org sopra) così un admin
    # "generico" di un altro sito non entra qui solo perché è nel gruppo
    # admins — deve avere anche il gruppo portainer. Vedi anche
    # authorization_policies.portainer_admins in oidc.yml: stessa policy,
    # riapplicata dentro Portainer per il login OIDC "Login with OAuth".
    - domain: 'portainer.whalestudio.dev'
      subject:
        - ['group:admins', 'group:portainer']
      policy: 'two_factor'

session:
  cookies:
    - domain: 'ildeposito.org'
      authelia_url: 'https://auth.ildeposito.org'
      name: 'authelia_session'
    - domain: 'whalestudio.dev'
      authelia_url: 'https://auth.whalestudio.dev'
      name: 'authelia_session'

storage:
  local:
    path: '/storage/db.sqlite3'

notifier:
  # SMTP reale: repo pubblico, quindi host/mittente/credenziali NON stanno
  # qui né vanno mai committati. Arrivano da authelia/.env (vedi
  # authelia/.env.example) come variabili AUTHELIA_NOTIFIER_SMTP_*
  # iniettate nel container da docker-compose.yml — Authelia le legge anche
  # senza una chiave "smtp:" esplicita in questo file. Quando authelia/.env
  # è compilato: scommenta quelle righe in docker-compose.yml e commenta il
  # blocco "filesystem" qui sotto (Authelia rifiuta la config se sono
  # attivi entrambi i notifier contemporaneamente).
  #
  # Notifier di fallback, disattivato ora che l'SMTP reale è configurato in
  # .env (non può stare attivo insieme a smtp): notifiche scritte su file
  # locale invece che inviate per email.
  # filesystem:
  #   filename: '/storage/notification.txt'
